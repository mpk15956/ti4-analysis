# Manuscript values manifest. Canonical artifacts — Phase 0/1/4/5 covered, plus
# the §3.10 RQ2/RQ4 prose<->json bridge (added at close-out, June 2026).
#
# This file enumerates every numerical value cited in the manuscript that is
# derived from a CSV/JSON/JSON artifact, paired with its source artifact and a
# verifier function in tests/test_manuscript_values.py. The validator runs
# four passes:
#
#   1. Schema + anchor resolution (Tier 2 entries' section_anchor must
#      resolve to exactly one section header in the target file).
#   2. Collision detection: no two non-regex entries may render the same
#      token within the same (file, section_anchor) scope.
#   3. Existence: each entry's rendered value must appear ≥ min_count times
#      in the target file/section/regex-window.
#   4. Artifact provenance: each entry's verifier function reads the source
#      artifact and confirms the manifest's raw_value matches.
#
# STATE. ~36 entries against the canonical CSVs: Phase 0 (SA cv/held-out),
# the Phase 1 ablation panel (C0-C4 medians, Friedman chi2, C0->C4 median diffs,
# Cohen's d_z, VDA, JFI-parity W, RQ3 within-C4 Spearman), and the Goodhart /
# distance-weight / LSAP-threshold sensitivity numbers. Added at the June 2026
# close-out: the §3.10 RQ2/RQ4 prose<->json bridge (RQ2 NSGA-II-vs-scalar VDA
# crossover points, the RQ4 six-way Friedman chi2, and the NSGA-II breadth-tax
# median + budget fraction). Their raw_values are read from the regenerated
# manuscript_values_phase6.json (glob-resolved from the latest rq4-available
# finalize dir) and anchored to the now-written §3.10 prose, never hand-
# transcribed. The json<->canonical edge for RQ2/RQ4 is guarded by
# tests/test_phase6_canonical_values.py; this file adds the prose<->json half.
#
# ENTRY SCHEMA:
#   key:               stable identifier (used in failure messages)
#   raw_value:         the value as extracted from the source artifact (full precision)
#   format:            Python format string (raw_value -> rendered_value)
#   files:             list of files where rendered_value must appear
#   match:             "token" (Tier 1), "section" (Tier 2), or "regex" (Tier 3)
#   section_anchor:    [Tier 2 only] section number ("3.2", "3.4.4") of the target section
#   pattern:           [Tier 3 only] explicit regex; rendered_value not used for match
#   source_artifact:   path or descriptor of where raw_value came from (provenance, for messages)
#   verifier:          name of registered verifier function (Pass 4)
#   min_count:         minimum occurrences required in scope (default 1; ≥2 for cross-cite redundancy)

entries:

  # ── Tier 1: numeric token, multi-occurrence in one file ──
  # |G| = 31 appears repeatedly in §3.3 and §3.4 of Methodology_Section.md.
  # min_count=5 allows for natural redundancy without being so loose that
  # a wholesale removal of the metric definition goes undetected.
  - key: g_size_canonical_6p
    raw_value: 31
    format: "{}"
    files:
      - docs/methodology/Methodology_Section.md
    match: token
    source_artifact: src/ti4_analysis/algorithms/map_topology.py (MapTopology.n_spatial via _canonical_6p_topology fixture)
    verifier: g_size_from_canonical_topology
    min_count: 5

  # ── Tier 1 with min_count=2: cross-section structural redundancy ──
  # The 90% Moran-share at Gen-0 is cited in BOTH §3.1 (the variance-dominance
  # argument) and §3.4.4 (the canonical-formulation justification). Either
  # reference dropping is a real edit; min_count=2 makes the structural
  # coherence assertable. Format renders raw_value=90 to literal "90\%"
  # (LaTeX-escaped percent in the manuscript prose).
  - key: gen0_moran_share_pct
    raw_value: 90
    format: "{}\\%"
    files:
      - docs/methodology/Methodology_Section.md
    match: token
    source_artifact: output/verify_pixi_apptainer_20260506_205045/variance_equalization_20260506_224438.csv
    verifier: gen0_moran_share_under_1_1_1
    min_count: 2

